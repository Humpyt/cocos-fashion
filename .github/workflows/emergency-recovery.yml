name: Emergency Recovery

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for emergency recovery'
        required: false
        type: string

jobs:
  emergency-recovery:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH (with key fix)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa

          # Fix SSH key format and permissions
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa > ~/.ssh/id_rsa.pub || echo "Key format OK"

          # Add host to known hosts
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.VPS_PORT }} \
            -o "StrictHostKeyChecking=no" \
            -o "ConnectTimeout=10" \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "echo 'SSH connection successful'"

      - name: Upload recovery script
        run: |
          scp -i ~/.ssh/id_rsa -P ${{ secrets.VPS_PORT }} \
            -o "StrictHostKeyChecking=no" \
            -o "ConnectTimeout=10" \
            deploy/hostinger/emergency-recovery.sh \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/emergency-recovery.sh

      - name: Run recovery script
        run: |
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.VPS_PORT }} \
            -o "StrictHostKeyChecking=no" \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "chmod +x /tmp/emergency-recovery.sh && sudo /tmp/emergency-recovery.sh"

      - name: Test websites
        run: |
          echo "Testing Coco's Fashion..."
          curl -I http://${{ secrets.VPS_HOST }}

          echo "Testing Eagles (if enabled)..."
          curl -I http://eaglesrugbyug.com || echo "Eagles may not be responding"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa ~/.ssh/id_rsa.pub
