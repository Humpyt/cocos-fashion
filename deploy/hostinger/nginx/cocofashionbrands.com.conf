server {
    listen 80;
    listen [::]:80;
    server_name cocofashionbrands.com www.cocofashionbrands.com;

    root /var/www/cocofashionbrands.com/current/dist;
    index index.html;

    client_max_body_size 20m;

    # Frontend SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API and media endpoints to Node backend
    location ~ ^/(v1|health|blouses|dresses|waist-coats|ladies-shoes) {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}

# After DNS points to this VPS, enable HTTPS:
# sudo certbot --nginx -d cocofashionbrands.com -d www.cocofashionbrands.com
